<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Connexion</h1>
          <p>Placer un formulaire de connexion ici</p>
          <form action="/api/auth/login" method="post">
            <label for="email">E-mail</label>
            <input type="text" id="email" value="" />
            <label for="pwd">Mot de passe</label>
            <input type="text" id="pwd" value="" />
            <input type="submit" value="submit" name="Valider" title="submit" />
          </form>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
      addEventListener(SubmitEvent, sendData);

      function sendData() {
        event.preventDefault(); //empêche de submit
        const email = document.getElementById("email");
        const password = document.getElementById("pwd");

        fetch("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({ email: email, password: password }),
        })
          .then(window.location("/"))
          .catch((e) => {
            console.log(e);
          });
      }
    </script>
  </body>
</html>
