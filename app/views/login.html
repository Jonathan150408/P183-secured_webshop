<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Connexion</h1>
          <!-- <form id="login_form" action="/api/auth/login" method="post"> -->
          <form id="login_form" novalidate>
            <label for="email">E-mail</label>
            <input type="text" id="email" value="" />
            <label for="pwd">Mot de passe</label>
            <input type="text" id="pwd" value="" />
            <input type="submit" id="submit_btn" onclick="sendData" />
            <!-- value="submit" name="Valider" title="submit" -->
          </form>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
      document
        .getElementById("login_form")
        .addEventListener("submit", sendData);

      function sendData(event) {
        event.preventDefault(); //empêche de submit
        const email = document.getElementById("email").value;
        const password = document.getElementById("pwd").value;

        fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        })
          .then(() => {
            window.location.href = "/";
            console.log(JSON.stringify({ email, password }));
          })
          .catch((e) => {
            console.log(e);
          });
      }
    </script>
  </body>
</html>
